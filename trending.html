<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GitHub Trending | AI Navigator</title>
  <meta name="description" content="GitHub Trending - 今日の注目リポジトリ">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header id="header">
    <div id="logo">
      <span id="logo-icon">Ai</span>
      <span id="logo-text">AI Navigator</span>
    </div>

    <nav id="tabbar">
      <a class="tab-btn" href="index.html">📰 AIニュース</a>
      <a class="tab-btn" href="official.html">📢 公式</a>
      <button class="tab-btn active">🌟 GitHub Trending</button>
    </nav>

    <div id="search-wrapper">
      <span id="search-icon">🔍</span>
      <input
        type="text"
        id="search-input"
        placeholder="リポジトリを検索..."
        autocomplete="off"
        spellcheck="false"
      >
    </div>

    <button id="sidebar-toggle" aria-label="フィルターを開く">☰</button>
  </header>

  <div id="app-layout">

    <aside id="sidebar">
      <section class="sidebar-section">
        <ul id="date-filter"></ul>
      </section>
    </aside>

    <main id="main">
      <div id="trending-info-banner">
        <div class="trending-info-item">🌟 GitHubで今日注目を集めているリポジトリを毎日自動収集</div>
        <div class="trending-info-item">🔥 <strong>複数日連続でランクイン</strong>したリポジトリには日数バッジを表示</div>
        <div class="trending-info-item">⭐ スター数・言語・説明文はGitHub APIから自動取得</div>
      </div>
      <div id="stats-bar">読み込み中...</div>
      <div id="articles-container">
        <div id="empty-state">
          <div class="empty-icon">⏳</div>
          <div>読み込み中...</div>
        </div>
      </div>
      <div id="load-more-wrapper" style="display:none">
        <button id="load-more-btn">もっと見る</button>
      </div>
    </main>

  </div>

  <script src="trending.js"></script>
  <!-- Cloudflare Web Analytics --><script defer src='https://static.cloudflareinsights.com/beacon.min.js' data-cf-beacon='{"token": "899bb0ef97f74baa90f5584bb37ff9c4"}'></script><!-- End Cloudflare Web Analytics -->
</body>
</html>
