<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Navigator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ヘッダー: ロゴ | タブ | 検索 -->
  <header id="header">
    <div id="logo">
      <span id="logo-icon">Ai</span>
      <span id="logo-text">AI Navigator</span>
    </div>

    <nav id="tabbar">
      <button class="tab-btn active" data-tab="latest">最新</button>
      <button class="tab-btn" data-tab="official">📢 公式</button>
    </nav>

    <div id="search-wrapper">
      <span id="search-icon">🔍</span>
      <input
        type="text"
        id="search-input"
        placeholder="記事を検索..."
        autocomplete="off"
        spellcheck="false"
      >
    </div>

    <!-- モバイル用サイドバートグル -->
    <button id="sidebar-toggle" aria-label="フィルターを開く">☰</button>
  </header>

  <!-- アプリレイアウト: サイドバー + メイン -->
  <div id="app-layout">

    <!-- 左サイドバー: フィルター -->
    <aside id="sidebar">
      <section class="sidebar-section">
        <ul id="category-filter"></ul>
      </section>
      <div class="sidebar-divider"></div>
      <section class="sidebar-section">
        <ul id="date-filter"></ul>
      </section>
    </aside>

    <!-- メインコンテンツ -->
    <main id="main">
      <div id="stats-bar">読み込み中...</div>
      <div id="articles-container">
        <div id="empty-state">
          <div class="empty-icon">⏳</div>
          <div>読み込み中...</div>
        </div>
      </div>
      <div id="load-more-wrapper" style="display:none">
        <button id="load-more-btn">もっと見る</button>
      </div>
    </main>

  </div>

  <script src="app.js"></script>
  <!-- Cloudflare Web Analytics --><script defer src='https://static.cloudflareinsights.com/beacon.min.js' data-cf-beacon='{"token": "899bb0ef97f74baa90f5584bb37ff9c4"}'></script><!-- End Cloudflare Web Analytics -->
</body>
</html>
