<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Navigator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ヘッダー -->
  <header id="header">
    <h1>AI <span>Navigator</span></h1>
    <div id="search-wrapper">
      <span id="search-icon">🔍</span>
      <input
        type="text"
        id="search-input"
        placeholder="記事を検索..."
        autocomplete="off"
        spellcheck="false"
      >
    </div>
  </header>

  <!-- タブバー -->
  <nav id="tabbar">
    <button class="tab-btn active" data-tab="latest">LATEST</button>
    <button class="tab-btn" data-tab="picks">PICKS</button>
    <button class="tab-btn" data-tab="ranking">RANKING</button>
  </nav>

  <!-- メインコンテンツ -->
  <main id="main">

    <!-- カテゴリフィルター -->
    <div class="filter-bar" id="category-filter"></div>

    <!-- 日付フィルター -->
    <div class="filter-bar" id="date-filter"></div>

    <!-- 統計バー -->
    <div id="stats-bar">読み込み中...</div>

    <!-- 記事一覧 -->
    <div id="articles-container">
      <div id="empty-state">
        <div class="empty-icon">⏳</div>
        <div>読み込み中...</div>
      </div>
    </div>

    <!-- もっと見る -->
    <div id="load-more-wrapper" style="display:none">
      <button id="load-more-btn">もっと見る</button>
    </div>

  </main>

  <script src="app.js"></script>
</body>
</html>
