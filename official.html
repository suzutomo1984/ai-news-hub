<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>公式リリース | AI Navigator — OpenAI・Anthropic・Google最新情報</title>
  <meta name="description" content="OpenAI・Anthropic・Google・Microsoft・MCP・LangChain等の公式リリース情報を毎日自動収集。AI企業の最新アップデートをまとめてチェック。">
  <meta property="og:title" content="公式リリース | AI Navigator — OpenAI・Anthropic・Google最新情報">
  <meta property="og:description" content="OpenAI・Anthropic・Google・Microsoft等の公式リリース情報を毎日自動収集。AI企業の最新アップデートをまとめてチェック。">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://ai-news-eev.pages.dev/official.html">
  <meta property="og:image" content="https://ai-news-eev.pages.dev/ogp.png">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="公式リリース | AI Navigator">
  <meta name="twitter:description" content="OpenAI・Anthropic・Google等の公式リリース情報を毎日自動収集。">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ヘッダー: ロゴ | タブ | 検索 -->
  <header id="header">
    <a href="index.html" id="logo">
      <span id="logo-icon">Ai</span>
      <span id="logo-text">AI Navigator</span>
    </a>

    <nav id="tabbar">
      <a class="tab-btn" href="index.html">📰 AIニュース</a>
      <button class="tab-btn active" data-tab="official">📢 公式</button>
      <a class="tab-btn" href="trending.html">🌟 GitHub Trending</a>
    </nav>

    <div id="search-wrapper">
      <span id="search-icon">🔍</span>
      <input
        type="text"
        id="search-input"
        placeholder="記事を検索..."
        autocomplete="off"
        spellcheck="false"
      >
    </div>

    <!-- モバイル用サイドバートグル -->
    <button id="sidebar-toggle" aria-label="フィルターを開く">☰</button>
  </header>

  <!-- モバイル: カテゴリタブバー（会社フィルター） -->
  <div id="mobile-category-bar">
    <div id="mobile-cat-scroll">
      <!-- official.js が動的に生成 -->
    </div>
    <button id="mob-date-btn">📅 <span id="mob-date-label">日付</span></button>
  </div>
  <div id="mob-date-dropdown">
    <div id="mob-date-list"></div>
  </div>

  <!-- ボトムナビ -->
  <nav id="bottom-nav">
    <a class="bnav-item" href="index.html">
      <span class="bnav-icon">🏠</span>
      <span class="bnav-label">ホーム</span>
    </a>
    <a class="bnav-item active" href="official.html">
      <span class="bnav-icon">📢</span>
      <span class="bnav-label">公式</span>
    </a>
    <a class="bnav-item" href="trending.html">
      <span class="bnav-icon">🌟</span>
      <span class="bnav-label">Trending</span>
    </a>
  </nav>

  <!-- アプリレイアウト: サイドバー + メイン -->
  <div id="app-layout">

    <!-- 左サイドバー: 会社フィルター + 日付フィルター -->
    <aside id="sidebar">
      <section class="sidebar-section">
        <ul id="company-filter"></ul>
      </section>
      <div class="sidebar-divider"></div>
      <section class="sidebar-section">
        <ul id="date-filter"></ul>
      </section>
    </aside>

    <!-- メインコンテンツ -->
    <main id="main">
      <div id="trending-info-banner">
        <div class="trending-info-item">📢 主要AI企業の公式ブログ・リリースノートを毎日自動収集</div>
        <div class="trending-info-item">🛠️ LangChain・MCP・Ollama等のSDK・フレームワーク情報も網羅</div>
        <div class="trending-info-item">⚡ ニュース記事と分離して一次情報だけを素早くチェック</div>
      </div>
      <div id="stats-bar">読み込み中...</div>
      <div id="articles-container">
        <div id="empty-state">
          <div class="empty-icon">⏳</div>
          <div>読み込み中...</div>
        </div>
      </div>
      <div id="load-more-wrapper" style="display:none">
        <button id="load-more-btn">もっと見る</button>
      </div>
    </main>

  </div>

  <!-- 記事詳細モーダル -->
  <div id="article-modal" class="modal-overlay" aria-hidden="true">
    <div class="modal-box">
      <button class="modal-close" id="modal-close-btn" aria-label="閉じる">✕</button>
      <div class="modal-thumb-wrap" id="modal-thumb-wrap"></div>
      <div class="modal-content">
        <div class="modal-meta" id="modal-meta"></div>
        <h2 class="modal-title" id="modal-title"></h2>
        <p class="modal-summary" id="modal-summary"></p>
        <a class="modal-read-btn" id="modal-read-btn" target="_blank" rel="noopener noreferrer">記事を読む →</a>
      </div>
    </div>
  </div>

  <script src="official.js"></script>
  <!-- Cloudflare Web Analytics --><script defer src='https://static.cloudflareinsights.com/beacon.min.js' data-cf-beacon='{"token": "899bb0ef97f74baa90f5584bb37ff9c4"}'></script><!-- End Cloudflare Web Analytics -->
</body>
</html>
